name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'KnotenCheckWeb/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: KnotenCheckWeb
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: KnotenCheckWeb/package-lock.json

      - run: npm ci
      - run: npx vitest run        # Tests müssen grün sein
      - run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: KnotenCheckWeb/dist
      - uses: actions/deploy-pages@v4
        id: deployment

name: KnotenCheck
options:
  bundleIdPrefix: ch.einfachsicher
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"

packages:
  KnotenCheckEngine:
    path: ../KnotenCheckEngine

targets:
  KnotenCheck_iOS:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - Sources/KnotenCheck
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: KnotenCheckEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.einfachsicher.KnotenCheck
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_FILE: Sources/KnotenCheck/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
